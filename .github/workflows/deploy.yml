# 워크플로우 이름
name: Deploy to EC2

# 트리거 조건: main 브랜치에 push할 때 실행
on:
  push:
    branches: [main]

# 전역 환경변수
env:
  AWS_REGION: ap-northeast-2      # AWS 리전 (서울)
  ECR_REPOSITORY: todo-api        # ECR 리포지토리 이름
  EC2_HOST: 43.200.163.24         # EC2 퍼블릭 IP

jobs:
  deploy:
    runs-on: ubuntu-latest        # GitHub 제공 Ubuntu 서버에서 실행

    steps:
      # 1. 코드 체크아웃 - GitHub에서 소스코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle로 Spring Boot 빌드 (JAR 파일 생성)
      - name: Build with Gradle
        run: ./gradlew bootJar

      # 4. AWS 자격 증명 설정 (Secrets에서 가져옴)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 이미지 빌드 & ECR에 푸시
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}  # ECR 주소
          IMAGE_TAG: ${{ github.sha }}                            # 커밋 해시를 태그로 사용
        run: |
          # linux/amd64 플랫폼으로 빌드 (EC2용)
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          # 커밋 해시 태그와 latest 태그 모두 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 7. docker-compose.prod.yml 파일을 EC2로 복사
      - name: Copy docker-compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ec2-user/app"

      # 8. EC2에 SSH 접속해서 Docker Compose로 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 앱 디렉토리로 이동
            cd /home/ec2-user/app

            # ECR 로그인
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 418272758232.dkr.ecr.ap-northeast-2.amazonaws.com

            # 환경변수 파일 생성
            cat > .env << EOF
            DATABASE_URL=jdbc:postgresql://database-2.c1s0044083lz.ap-northeast-2.rds.amazonaws.com:5432/postgres
            DATABASE_USERNAME=postgres
            DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }}
            CORS_ALLOWED_ORIGINS=http://localhost:5173
            EOF

            # 새 이미지 가져오기
            docker compose -f docker-compose.prod.yml pull

            # 기존 컨테이너 중지 & 새로 시작
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d

            # 사용하지 않는 이미지 정리
            docker image prune -f
