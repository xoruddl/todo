name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: todo-api
  EC2_HOST: 43.200.163.24

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew bootJar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 418272758232.dkr.ecr.ap-northeast-2.amazonaws.com
            docker pull 418272758232.dkr.ecr.ap-northeast-2.amazonaws.com/todo-api:latest
            docker stop todo-api || true
            docker rm todo-api || true
            docker run -d --name todo-api -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DATABASE_URL=jdbc:postgresql://database-2.c1s0044083lz.ap-northeast-2.rds.amazonaws.com:5432/postgres \
              -e DATABASE_DRIVER=org.postgresql.Driver \
              -e DATABASE_USERNAME=postgres \
              -e DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e CORS_ALLOWED_ORIGINS=http://localhost:5173 \
              418272758232.dkr.ecr.ap-northeast-2.amazonaws.com/todo-api:latest
